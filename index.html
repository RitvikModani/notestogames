<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotesToGames — study your notes by playing</title>
    <meta
      name="description"
      content="Paste your class notes and instantly turn them into fun interactive study games: flashcards, quizzes, memory match, fill-in-the-blank and word guessing. Free and private."
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div id="brand" class="brand" role="button" tabindex="0" aria-label="NotesToGames home">
          <span class="brand-mark">🎮</span>
          <span class="brand-name">Notes<span class="grad">To</span>Games</span>
        </div>
        <div class="topbar-right">
          <div id="hud" class="hud"></div>
          <button id="sound-toggle" class="icon-btn" type="button" aria-label="Toggle sound" aria-pressed="true">🔊</button>
        </div>
      </div>
    </header>

    <main id="app"></main>

    <footer class="site-footer">
      <p>
        Made for students · Your notes never leave your device · Free forever
      </p>
    </footer>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
